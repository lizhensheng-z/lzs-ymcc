				background: #667eea;
				color: #fff;

				margin-right: 15px;
				flex-shrink: 0;

			.message-content {

			.message-title {

				color: #333;
				margin-bottom: 5px;
			}
			.message-desc {
				font-size: 12px;
				color: #999;
				overflow: hidden;
				text-overflow: ellipsis;

			}
			.message-time {

				flex-shrink: 0;
				margin-left: 15px;
			}
			.empty-message {

			}
			.empty-message i {

			.toolbar {

			.toolbar .btn {

				<!-- 右侧内容 -->
				<div class="con-right fr" id="app">
					<div class="toolbar">
						<h3>消息中心</h3>
						<button class="btn" @click="markAllRead">全部标记已读</button>
					</div>

					<!-- 消息分类 -->
					<div class="message-tabs">
						<div class="message-tab" :class="{active: currentType === ''}" @click="changeType('')">
							全部消息
						</div>
						<div class="message-tab" :class="{active: currentType === 'SYSTEM'}" @click="changeType('SYSTEM')">
							系统通知
						</div>
						<div class="message-tab" :class="{active: currentType === 'ORDER'}" @click="changeType('ORDER')">
							订单通知
						</div>
						<div class="message-tab" :class="{active: currentType === 'COURSE'}" @click="changeType('COURSE')">
							学习通知
						</div>
					</div>

					<!-- 消息列表 -->
					<div class="message-list">
						<div v-if="messageList.length > 0">
							<div class="message-item"
								 :class="{unread: !item.readStatus}"
								 v-for="item in messageList"
								 :key="item.id"
								 @click="viewDetail(item)">
								<div class="message-icon">
									{{getTypeIcon(item.type)}}
								</div>
								<div class="message-content">
									<div class="message-title">{{item.title}}</div>
									<div class="message-desc">{{item.content}}</div>
								</div>
								<div class="message-time">{{formatTime(item.createTime)}}</div>
							</div>
						</div>
						<div v-else class="empty-message">
							<i>📭</i>
							<p>暂无消息</p>
						</div>
					</div>
				</div>
			</div>

		<script>
			new Vue({
				el: '#app',
				data: {
					currentType: '',
					messageList: [],
					messageTypes: {
						'SYSTEM': '系统',
						'ORDER': '订单',
						'COURSE': '学习'
					}
				},
				mounted() {
					this.loadMessages();
				},
				methods: {
					loadMessages() {
						let url = '/user/message/list';
						if (this.currentType) {
							url += '?type=' + this.currentType;
						}
						this.$http.get(url)
							.then(res => {
								if (res.data.success) {
									this.messageList = res.data.data || [];
								}
							})
							.catch(() => {
								this.messageList = [];
							});
					},
					changeType(type) {
						this.currentType = type;
						this.loadMessages();
					},
					getTypeIcon(type) {
						return this.messageTypes[type] ? this.messageTypes[type][0] : '通';
					},
					formatTime(time) {
						if (!time) return '';
						const date = new Date(time);
						const now = new Date();
						const diff = now - date;
						if (diff < 60000) return '刚刚';
						if (diff < 3600000) return Math.floor(diff / 60000) + '分钟前';
						if (diff < 86400000) return Math.floor(diff / 3600000) + '小时前';
						return date.toLocaleDateString();
					},
					viewDetail(item) {
						// 标记已读
						if (!item.readStatus) {
							this.$http.post('/user/message/read', {id: item.id})
								.then(res => {
									if (res.data.success) {
										item.readStatus = true;
									}
								});
						}
						// 显示详情
						if (item.content) {
							alert(item.title + '\n\n' + item.content);
						}
					},
					markAllRead() {
						this.$http.post('/user/message/readAll')
							.then(res => {
								if (res.data.success) {
									this.loadMessages();
									alert('已全部标记为已读');
								}
							});
					}
				}
			});
		</script>
