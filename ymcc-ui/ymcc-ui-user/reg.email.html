<script type="text/javascript">
	$().ready(function() {
		new Vue({
			el:"#myApp",
			data(){
				return {
					imageCodePrefix:"data:image/jpg;base64,",
					imageCode:'',
					formParams:{
						email:'',
						password:'',
						imageCode:'',
						emailCode:'',
						regChannel:2 //注册的渠道，2表示邮箱注册
					}
				}
			},
			methods:{
				createUuid(){
					var s = [];
					var hexDigits = "0123456789abcdefghi";
					for (var i = 0; i < 36; i++) {
						s[i] = hexDigits.substr(Math.floor(Math.random() * 0x10), 1);
					}
					s[14] = "4"; // bits 12-15 of the time_hi_and_version field to 0010
					s[19] = hexDigits.substr((s[19] & 0x3) | 0x8, 1); // bits 6-7 of the clock_seq_hi_and_reserved to 01
					s[8] = s[13] = s[18] = s[23] = "-";
					var uuid = s.join("");
					return uuid;
				},
				getImageCode(){
					let imageCodeKey = sessionStorage.getItem("registerImageCodeKey");
					if(!imageCodeKey || imageCodeKey === ''){
						imageCodeKey = this.createUuid();
						sessionStorage.setItem("registerImageCodeKey",imageCodeKey);
					}
					this.$http.get("/common/verifycode/imageCode/"+imageCodeKey).then(res=>{
						this.imageCode = this.imageCodePrefix+res.data.data;
					})
				},
				submitRegister(){
					this.$http.post("/user/user/register",this.formParams).then(res=>{
						var ajaxResult = res.data;
						if(ajaxResult.success){
							$.alert("注册成功");
							window.location.href = "http://127.0.0.1:6003/login.html";
						}else{
							$.alert("注册失败:"+ajaxResult.message);
						}
					})
				},
				sendEmailCode(event){
					//1.判断邮箱不为空
					if(!this.formParams.email){
						$.alert("邮箱不能为空");
						return;
					}

					//2.判断图片验证码不为空
					if(!this.formParams.imageCode){
						$.alert("图片验证码不能为空");
						return;
					}

					//3.获取按钮，禁用按钮
					var sendBtn = $(event.target);
					sendBtn.attr("disabled",true);

					//4.发送ajax请求
					this.$http.get("/common/verifyCode/sendEmailCode/"+this.formParams.email).then(res=>{
						var ajaxResult = res.data;
						if(ajaxResult.success){
							$.alert("邮箱验证码已经发送到您的邮箱，请在5分钟内使用");
							//4.1.发送成功：倒计时
							var time = 60;
							var interval = window.setInterval( function () {
								time = time - 1;
								sendBtn.html(time+"秒后重发");
								if(time <= 0){
									sendBtn.html("重新发送");
									sendBtn.attr("disabled",false);
									window.clearInterval(interval);
								}
							},1000);
						}else{
							sendBtn.attr("disabled",false);
							$.alert("发送失败:"+ajaxResult.message);
						}
					}).catch(error => {
						sendBtn.attr("disabled",false);
						$.alert("发送失败:"+error.message);
					})
				}
			},
			mounted(){
				this.getImageCode();
			}
		});

		$(".user_protocol").click(function() {
			if($.modal($(this))) {
				$.modal($(this)).show();
			} else {
				var modal = $.modal({
					title: "用户注册协议",
					trigger: $(this),
					content: $("#user_protocol").html()
				});
				modal.addButton({
					text: "同意协议并继续",
					click: function() {
						$("input[type='checkbox']").prop("checked", true);
						$("#btn_submit").removeAttr("disabled");
						this.hide();
					}
				});
			}
		});
	});
</script>
