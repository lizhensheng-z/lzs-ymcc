seata:
  service:
    vgroupMapping:
      fsp_tx_group: default
    grouplist:
      default: 101.43.63.144:8091
#mybatis-plus
mybatis-plus:
  mapper-locations: classpath:/cn/lzs/ymcc/mapper/*.xml #加载读取 mapper.xml 文件的位置

# Feign 和 Ribbon 超时配置
ribbon:
  # 建立连接的超时时间（毫秒）
  ConnectTimeout: 10000
  # 读取资源的超时时间（毫秒）
  ReadTimeout: 30000
  # 请求处理的超时时间（毫秒）
  OkToRetryOnAllOperations: false
  # 重试次数
  MaxAutoRetries: 1
  # 切换实例的重试次数
  MaxAutoRetriesNextServer: 1

feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000

rocketmq:
  name-server: 101.43.63.144:9876
  #生产者配置
  producer:
    #生产者组名字
    group: "service-pay-producer"
    # 消息最大长度 默认 1024 * 4 (4M)
    max-message-size: 4096
    # 发送消息超时时间，默认 3000
    send-message-timeout: 3000
    # 发送消息失败重试次数，默认2
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2
