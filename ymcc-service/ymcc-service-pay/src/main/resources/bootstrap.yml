spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev # dev开发 环境
  application:
    name: service-pay
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 #注册中心
      config:
        server-addr: localhost:8848 #配置中心
        file-extension: yaml #配置文件格式 配置后缀
        prefix: application-pay #配置前缀 ，默认使用sring.application.name
        group: DEFAULT_GROUP
        namespace: b6d39fe1-f58a-4587-a8f1-8a7d823cbf94 #命名空间 自定义-pay