server:
  port: 10030
spring:
  application:
    name: service-uaa   #服务名
  cloud: #注册到Nacos
    nacos:
      discovery:
        server-addr: 101.43.63.144:8848
    alibaba:
      seata:
        tx-service-group: fsp_tx_group #这里和file.conf中事务组名一样
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://101.43.63.144:3306/ymcc_uaa?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    database: 0
    host: 101.43.63.144
    port: 6379
    jedis:
      pool:
        max-wait: 2000ms
        min-idle: 2
        max-idle: 8
seata:
  enableAutoDataSourceProxy: false #关闭DataSource代理的自动配置，我们要手动配置
#mybatis-plus
mybatis-plus:
  mapper-locations: classpath:/cn/lzs/ymcc/mapper/*.xml #加载读取mapper.xml文件的位置

#拼接url 发起登录认证获取token
ymcc:
  authUrl: http://localhost:${server.port}/oauth/token?client_id=%s&client_secret=%s&grant_type=password&username=%s&password=%s
#  http://localhost:10030/oauth/token?client_id=admin&client_secret=123&grant_type=password&username=yhptest1&password=admin123
  refreshUrl: http://localhost:${server.port}/oauth/token?grant_type=refresh_token&refresh_token=%s&client_id=%s&client_secret=%s
#  http://localhost:10030/oauth/token?grant_type=refresh_token&refresh_token=刷新token值&client_id=admin&client_secret=123