spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev # dev开发 环境
  application:
    name: service-uaa
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 #注册中心
      config:
        server-addr: localhost:8848 #配置中心
        file-extension: yaml #配置文件格式 配置后缀
        prefix: application-uaa #配置前缀 ，默认使用sring.application.name
        group: DEFAULT_GROUP
        namespace: 9d9a9300-e217-483f-8a70-ad30bdcfbc7b #命名空间 自定义-uaa