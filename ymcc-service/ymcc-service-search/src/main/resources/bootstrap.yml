spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev # dev开发 环境
  application:
    name: service-search
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 #注册中心
      config:
        server-addr: localhost:8848 #配置中心
        file-extension: yaml #配置文件格式 配置后缀
        prefix: application-search #配置前缀 ，默认使用sring.application.name
        group: DEFAULT_GROUP
        namespace: 77c9ec65-5829-4bc0-bb1b-919823d0f95d #命名空间 自定义-search