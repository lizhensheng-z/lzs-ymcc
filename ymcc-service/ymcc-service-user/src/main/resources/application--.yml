server:
  port: 10040
spring:
  application:
    name: service-user  #服务名
  cloud: #注册到Nacos
    nacos:
      discovery:
        server-addr: 101.43.63.144:8848
    alibaba:
      seata:
        tx-service-group: fsp_tx_group #这里和file.conf中事务组名一样
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://101.43.63.144:3306/ymcc_user?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  redis:
    database: 0
    host: 101.43.63.144
    port: 6379
    jedis:
      pool:
        max-wait: 2000ms
        min-idle: 2
        max-idle: 8
seata:
  enableAutoDataSourceProxy: false #关闭DataSource代理的自动配置，我们要手动配置
  service:
    vgroupMapping:
      fsp_tx_group: default
    grouplist:
      default: 101.43.63.144:8091
#mybatis-plus
mybatis-plus:
  mapper-locations: classpath:/cn/lzs/ymcc/mapper/*.xml #加载读取 mapper.xml 文件的位置

# Feign 和 Ribbon 超时配置
ribbon:
  # 建立连接的超时时间（毫秒）
  ConnectTimeout: 10000
  # 读取资源的超时时间（毫秒）
  ReadTimeout: 30000
  # 请求处理的超时时间（毫秒）
  OkToRetryOnAllOperations: false
  # 重试次数
  MaxAutoRetries: 1
  # 切换实例的重试次数
  MaxAutoRetriesNextServer: 1

feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000