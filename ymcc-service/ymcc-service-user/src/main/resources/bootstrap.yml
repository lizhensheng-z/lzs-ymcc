spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev # dev开发 环境
  application:
    name: service-user
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 #注册中心
      config:
        server-addr: localhost:8848 #配置中心
        file-extension: yaml #配置文件格式 配置后缀
        prefix: application-user #配置前缀 ，默认使用sring.application.name
        group: DEFAULT_GROUP
        namespace: dc76fae0-e3e4-492f-a98f-24769ac4ab95 #命名空间 自定义-user