spring:
  main:
    allow-bean-definition-overriding: true
  profiles:
    active: dev # dev开发 环境
  application:
    name: service-system
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848 #注册中心
      config:
        server-addr: localhost:8848 #配置中心
        file-extension: yaml #配置文件格式 配置后缀
        prefix: application-system #配置前缀 ，默认使用sring.application.name
        group: DEFAULT_GROUP
        namespace: 369060d6-f4c7-4b55-8d57-377cc15664a1 #命名空间 自定义-system