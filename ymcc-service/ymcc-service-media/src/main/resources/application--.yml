server:
  port: 10070
spring:
  application:
    name: service-media  #服务名
  servlet:
    multipart:
      max-file-size: 52428800  # 单个文件最大 50MB
      max-request-size: 52428800  # 请求最大 50MB
      enabled: true  # 启用文件上传
  cloud: #注册到 Nacos
    nacos:
      discovery:
        server-addr: 101.43.63.144:8848
  datasource:
    username: root
    password: 123456
    url: jdbc:mysql://101.43.63.144:3306/ymcc_media?useSSL=false&serverTimezone=UTC
    driver-class-name: com.mysql.cj.jdbc.Driver
    type: com.alibaba.druid.pool.DruidDataSource

#mybatis-plus
mybatis-plus:
  mapper-locations: classpath:/cn/lzs/ymcc/mapper/*.xml #加载读取 mapper.xml 文件的位置

# Feign 和 Ribbon 超时配置
ribbon:
  # 建立连接的超时时间（毫秒）
  ConnectTimeout: 10000
  # 读取资源的超时时间（毫秒）
  ReadTimeout: 30000
  # 请求处理的超时时间（毫秒）
  OkToRetryOnAllOperations: false
  # 重试次数
  MaxAutoRetries: 1
  # 切换实例的重试次数
  MaxAutoRetriesNextServer: 1

feign:
  httpclient:
    enabled: true
  okhttp:
    enabled: false
  client:
    config:
      default:
        connectTimeout: 10000
        readTimeout: 30000



media:
  upload-base-dir: "d:/yunClass/" #分片上传地址
  #oad‐location: "d:/"  #合并之后的视频文件存储地址
  ffmpeg‐path: "D:/develop/ffmpeg/bin/ffmpeg.exe" #ffmpeg视频工具安装地址
  rtmp: "rtmp://47.103.106.227/live/" # 推流到云服务器的地址
  play: "http://47.103.106.227:8080/live/" #播放地址
rocketmq:
  name-server: 101.43.63.144:9876

  #生产者配置
  producer:
    #生产者组名字
    group: "service-media-producer"
    # 消息最大长度 默认 1024 * 4 (4M)
    max-message-size: 4096
    # 发送消息超时时间，默认 3000
    send-message-timeout: 3000
    # 发送消息失败重试次数，默认2
    retry-times-when-send-failed: 2
    retry-times-when-send-async-failed: 2